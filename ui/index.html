<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cubox Exporter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Cubox 导出器</h1>
      <p class="subtitle">导出高亮数据为 JSON，可直接导入 Acorny</p>
    </header>

    <div class="form-group">
      <label for="domain">Cubox 区域</label>
      <select id="domain">
        <option value="cubox.cc">cubox.cc（国际版）</option>
        <option value="cubox.pro">cubox.pro（国内版）</option>
      </select>
    </div>

    <div class="form-group">
      <label for="apiKey">API Key</label>
      <div class="input-wrapper">
        <input
          type="password"
          id="apiKey"
          placeholder="请输入 Cubox API Key"
          autocomplete="off"
        />
        <button type="button" id="togglePassword" class="toggle-btn" title="显示/隐藏">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <p class="hint">在 Cubox 设置 → 扩展 → API 中获取</p>
    </div>

    <button id="exportBtn" class="primary-btn">
      <span id="btnText">导出高亮</span>
      <span id="btnSpinner" class="spinner" style="display:none"></span>
    </button>

    <div id="progress" class="status-area" style="display:none">
      <p id="progressText" class="status-text"></p>
    </div>

    <div id="result" class="status-area success" style="display:none">
      <p id="resultText" class="status-text"></p>
      <p id="resultPath" class="status-detail"></p>
    </div>

    <div id="error" class="status-area error" style="display:none">
      <p id="errorText" class="status-text"></p>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
